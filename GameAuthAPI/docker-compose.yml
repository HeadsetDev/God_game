version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  gameapi:
    build: .
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Game=Server=sqlserver;Database=Game;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__SecretKey=9WSkeaClDFw0ps-ezWGGmGEMFVOUVerAW_tqYF2aWjg=
      - JwtSettings__Issuer=GameAuthAPI
      - JwtSettings__Audience=GamePlayers
    ports:
      - "5144:5144"
      - "7443:7443"
    depends_on:
      - sqlserver
      - redis
      - rabbitmq
    restart: unless-stopped

volumes:
  sqlserver_data:
  redis_data:
  rabbitmq_data: